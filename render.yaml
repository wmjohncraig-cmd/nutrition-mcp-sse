services:
  - type: web
    name: nutrition-mcp-sse
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: NUTRITION_API_URL
        value: https://garmin-sleep-api.onrender.com
      - key: NUTRITION_API_KEY
        sync: false
